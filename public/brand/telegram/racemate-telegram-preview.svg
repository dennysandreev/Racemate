<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">RaceMate Telegram bot description picture</title>
  <desc id="description">Приветственное превью RaceMate с фирменным знаком, сообщением о гоночном уикенде и абстрактной трассой.</desc>
  <defs>
    <radialGradient id="preview-bg" cx="73%" cy="42%" r="78%">
      <stop offset="0" stop-color="#241111" />
      <stop offset="0.42" stop-color="#111010" />
      <stop offset="1" stop-color="#080808" />
    </radialGradient>
    <linearGradient id="speed-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e10600" stop-opacity="0" />
      <stop offset="0.46" stop-color="#e10600" stop-opacity="0.4" />
      <stop offset="1" stop-color="#e10600" stop-opacity="0" />
    </linearGradient>
    <pattern id="telemetry-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" fill="none" stroke="#fff" stroke-opacity="0.035" stroke-width="1" />
    </pattern>
    <mask id="rm-mask-small" maskUnits="userSpaceOnUse" x="0" y="0" width="96" height="56">
      <rect width="96" height="56" fill="#fff" />
      <path d="M39 36h8l-3 19Z" fill="#000" />
    </mask>
    <mask id="rm-mask-large" maskUnits="userSpaceOnUse" x="0" y="0" width="96" height="56">
      <rect width="96" height="56" fill="#fff" />
      <path d="M39 36h8l-3 19Z" fill="#000" />
    </mask>
    <filter id="red-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <path id="circuit" d="M1217 112c142 4 246 91 255 207 9 111-57 183-151 208-70 19-101 55-82 108 20 58 98 82 165 47 70-37 86-124 39-181-49-60-141-69-199-36-59 33-105 106-177 99-94-9-157-92-142-178 18-104 133-151 225-157 57-4 88-36 80-81-4-23-2-37 7-36Z" />
  </defs>

  <rect width="1600" height="900" fill="url(#preview-bg)" />
  <rect width="1600" height="900" fill="url(#telemetry-grid)" />
  <rect x="24" y="24" width="1552" height="852" rx="12" fill="none" stroke="#fff" stroke-opacity="0.08" stroke-width="2" />

  <g opacity="0.09" transform="translate(915 274) scale(7.15)">
    <g fill="#e10600" mask="url(#rm-mask-large)">
      <path d="M6 10 16 0h29c12 0 20 7 20 18 0 12-8 19-20 19h-7l12 15-7 4-14-19h-3c-5 0-8 2-11 6L5 56H0l16-23c3-4 7-6 13-6h16c6 0 10-3 10-8.5S51 10 45 10Z" />
      <path d="M44 56 86 0h10v56H86V17L54 56Z" />
    </g>
  </g>

  <g transform="translate(96 68) scale(1.08)">
    <g fill="#e10600" mask="url(#rm-mask-small)">
      <path d="M6 10 16 0h29c12 0 20 7 20 18 0 12-8 19-20 19h-7l12 15-7 4-14-19h-3c-5 0-8 2-11 6L5 56H0l16-23c3-4 7-6 13-6h16c6 0 10-3 10-8.5S51 10 45 10Z" />
      <path d="M44 56 86 0h10v56H86V17L54 56Z" />
    </g>
  </g>
  <text x="224" y="112" fill="#f5f4f2" font-family="Helvetica Neue, Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="-1.6">RaceMate</text>
  <text x="227" y="145" fill="#aaa6a5" font-family="Helvetica Neue, Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="3.3">ГОНОЧНЫЙ ЦЕНТР</text>

  <rect x="96" y="281" width="84" height="8" rx="4" fill="#e10600" />
  <text x="94" y="392" fill="#f5f4f2" font-family="Helvetica Neue, Arial, sans-serif" font-size="91" font-weight="800" letter-spacing="-3.4">ВЕСЬ ГОНОЧНЫЙ</text>
  <text x="94" y="494" fill="#f5f4f2" font-family="Helvetica Neue, Arial, sans-serif" font-size="91" font-weight="800" letter-spacing="-3.4">УИКЕНД РЯДОМ</text>
  <text x="99" y="568" fill="#c8c4c2" font-family="Helvetica Neue, Arial, sans-serif" font-size="27" font-weight="500">Сессии, прогнозы и главные новости в нужный момент.</text>

  <path d="M92 706h598" stroke="#fff" stroke-opacity="0.12" stroke-width="2" />
  <circle cx="104" cy="753" r="6" fill="#e10600" />
  <text x="128" y="761" fill="#aaa6a5" font-family="Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="2.1">RACEMATE.RU</text>

  <use href="#circuit" fill="none" stroke="#343131" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
  <use href="#circuit" fill="none" stroke="#151414" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
  <use href="#circuit" fill="none" stroke="#868080" stroke-opacity="0.42" stroke-width="2" stroke-dasharray="7 17" stroke-linecap="round" />
  <use href="#circuit" fill="none" stroke="#e10600" stroke-width="7" stroke-dasharray="240 1600" stroke-dashoffset="-815" stroke-linecap="round" filter="url(#red-glow)" />
  <circle cx="1039" cy="550" r="10" fill="#e10600" filter="url(#red-glow)" />

  <path d="M784 829h720" stroke="url(#speed-fade)" stroke-width="3" />
  <path d="M942 843h474" stroke="url(#speed-fade)" stroke-width="2" opacity="0.6" />
</svg>
