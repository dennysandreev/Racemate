services:
  web:
    build: .
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped

  worker:
    build: .
    env_file:
      - .env
    command: ["node", "worker/index.mjs", "rss.fetch_all"]
    restart: "no"

  cron:
    build: .
    env_file:
      - .env
    command:
      - sh
      - -lc
      - |
        tick=0
        while true; do
          node worker/index.mjs social.fetch_all || true
          node worker/index.mjs social.process_ai || true
          node worker/index.mjs polls.generate_next_race || true
          if [ $((tick % 6)) -eq 0 ]; then
            node worker/index.mjs social.refresh_metrics || true
          fi
          if [ $((tick % 6)) -eq 0 ]; then
            node worker/index.mjs rss.fetch_all || true
            node worker/index.mjs ai.process_news || true
            node worker/index.mjs jolpica.sync_calendar || true
            node worker/index.mjs jolpica.sync_results || true
            node worker/index.mjs jolpica.sync_standings || true
            node worker/index.mjs openf1.sync_sessions || true
            node worker/index.mjs openf1.sync_laps || true
            node worker/index.mjs weather.sync_weekend || true
            node worker/index.mjs predictions.score || true
            node worker/index.mjs circuit_stats.sync_all || true
            node worker/index.mjs reports.check_latest || true
            node worker/index.mjs reports.refresh_due || true
          fi
          tick=$((tick + 1))
          sleep 300
        done
    restart: unless-stopped

  digest-scheduler:
    build: .
    env_file:
      - .env
    command:
      - sh
      - -lc
      - |
        last_run=""
        while true; do
          day="$(date -u +%F)"
          clock="$(date -u +%H:%M)"
          if [ "$clock" = "12:00" ] && [ "$last_run" != "$day" ]; then
            node worker/index.mjs ai.generate_daily_digest || true
            last_run="$day"
          fi
          sleep 20
        done
    restart: unless-stopped
